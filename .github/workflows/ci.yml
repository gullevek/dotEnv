  #         # We need to use phpunit from the self install to get the class paths
  #     - name: PHPunit Tests
  #       run: |
  #         vendor/bin/phpunit
  ci-php-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, intl, sqlite, pdo_sqlite
        # ini-values: post_max_size=256M, max_execution_time=180
        tools: composer, phan, phpstan, phpcs, phpunit, cs2pr
        coverage: xdebug
    - name: Setup problem matchers for PHP
      run: echo "::add-matcher::${{ runner.tool_cache }}/php.json"
    - name: Setup problem matchers for PHPUnit
      run: echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

    - name: Get composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      # working-directory: ./web

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install dependencies
      run: |
        composer install --prefer-dist

    - name: Run composer audit
      run: composer audit --format=json --no-scripts --no-plugins --no-interaction > composer-audit-output.json

    - name: Run phpcs
      run: phpcs -q --report=checkstyle --standard=phpcs.xml --ignore=vendor/ ./web | cs2pr

    - name: Run phan
      if: ${{ vars.DISABLE_PHAN || 'not_set' != 'disable' }}
      run: phan --analyze-twice --no-progress-bar --config-file=./.phan/config.php

    # Must have "./tmp" directory set in configuration
    # if we have "./tmp/phpstan" or anything different adjust the path below
    - name: "Restore result cache"
      uses: actions/cache/restore@v4
      with:
        path: ./tmp
        key: "result-cache-${{ github.run_id }}"
        restore-keys: |
          result-cache-v1-
    - name: Run PHPStan
      run: phpstan analyse --no-progress --configuration=phpstan.neon
    - name: "Save result cache"
      uses: actions/cache/save@v4
      if: always()
      with:
        path: ./tmp
        key: "result-cache-${{ github.run_id }}"

    - name: Test with phpunit
      run: phpunit --coverage-text
