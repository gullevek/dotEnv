name: PHPstan and PHPunit CI
run-name: ${{ github.actor}} runs PHPstan and PHPunit CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - development
  pull_request:
    branches:
      - main
      - master
      - development

